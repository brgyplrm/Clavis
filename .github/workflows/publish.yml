name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set OpenSSL path (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          # Find the main OpenSSL directory
          if [ -d "C:/Program Files/OpenSSL" ]; then
            openssl_dir="C:\\Program Files\\OpenSSL"
            search_dir="/c/Program Files/OpenSSL"
          elif [ -d "C:/Program Files/OpenSSL-Win64" ]; then
            openssl_dir="C:\\Program Files\\OpenSSL-Win64"
            search_dir="/c/Program Files/OpenSSL-Win64"
          else
            echo "::error::OpenSSL directory not found!"
            exit 1
          fi
          
          echo "OPENSSL_DIR=$openssl_dir" >> $GITHUB_ENV
          
          # Dynamically locate libcrypto.lib inside the directory
          lib_file=$(find "$search_dir" -name "libcrypto.lib" | head -n 1)
          if [ -n "$lib_file" ]; then
            lib_dir=$(dirname "$lib_file")
            windows_lib_dir=$(cygpath -w "$lib_dir")
            echo "Found libcrypto.lib at: $windows_lib_dir"
            echo "OPENSSL_LIB_DIR=$windows_lib_dir" >> $GITHUB_ENV
          else
            echo "::error::libcrypto.lib not found!"
            exit 1
          fi

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libxdo-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies & Build
        run: |
          npm install
          npm run build

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: clavis-v__VERSION__
          releaseName: 'Clavis v__VERSION__'
          releaseBody: 'See the assets below to download and install this version of Clavis.'
          releaseDraft: true
          prerelease: false
